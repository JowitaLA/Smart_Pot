<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Smart Pot</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🌱 Smart Pot 🌱</h1>

<div class="card">
  <p>Godzina: <span id="time">8</span>:00</p>
  <p>Zdrowie rośliny: <span id="health">80</span>%</p>

  <p>Wilgotność gleby: <span id="soilVal">50</span></p>
  <input type="range" id="soil" min="0" max="100" value="50">

  <p>Światło: <span id="lightVal">50</span></p>
  <input type="range" id="light" min="0" max="100" value="50">

  <p>Temperatura: <span id="tempVal">20</span>°C</p>
  <input type="range" id="temp" min="0" max="40" value="20">

  <br><br>

  <button onclick="step(24)">Następny dzień</button>
  <button onclick="step(1)">Następna godzina</button>

  </br>

  
  <button onclick="changePlant('storczyk')">Kup storczyk</button>
  <button onclick="changePlant('kaktus')">Kup kaktus</button>
  <button onclick="changePlant('paprotka')">Kup paprotkę</button>

  <p id="msg"></p>
</div>

<script type=module src="script.js"></script>
</body>
</html>
