<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Smart Doniczka - Gra Fuzzy</title>
<style>
  body {
    font-family: Arial;
    text-align: center;
    transition: background 1s;
  }
  .card {
    background: white;
    padding: 20px;
    margin: 20px auto;
    width: 300px;
    border-radius: 15px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
  }
  button {
    margin: 5px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
  }
</style>
</head>

<body>

<h1>🌱 Smart Doniczka (Fuzzy Game)</h1>

<div class="card">
  <p>Godzina: <span id="time">8</span>:00</p>
  <p>Zdrowie rośliny: <span id="health">80</span>%</p>

  <p>Wilgotność gleby: <span id="soilVal">50</span></p>
  <input type="range" id="soil" min="0" max="100" value="50">

  <p>Światło: <span id="lightVal">50</span></p>
  <input type="range" id="light" min="0" max="100" value="50">

  <p>Temperatura: <span id="tempVal">20</span>°C</p>
  <input type="range" id="temp" min="0" max="40" value="20">

  <br><br>

  <button onclick="water()">💧 Podlej</button>
  <button onclick="lamp()">💡 Światło</button>
  <button onclick="step()">⏭️ Następny krok</button>

  <p id="msg"></p>
</div>

<script>

// ===== FUNKCJE ROZMYTE =====
function triangle(x, a, b, c) {
  return Math.max(Math.min((x-a)/(b-a), (c-x)/(c-b)), 0);
}

// ===== STAN =====
let time = 8;
let health = 80;

// ===== AKTUALIZACJA =====
function updateUI() {
  document.getElementById("time").innerText = time;
  document.getElementById("health").innerText = health;

  document.getElementById("soilVal").innerText = soil.value;
  document.getElementById("lightVal").innerText = light.value;
  document.getElementById("tempVal").innerText = temp.value;

  // dzień / noc
  let day = triangle(time, 6, 12, 18);
  document.body.style.background = day > 0.5 ? "#f7e9a0" : "#1e2a5a";
}

// ===== GRA + FUZZY =====
function step() {

  let s = parseInt(soil.value);
  let l = parseInt(light.value);
  let t = parseInt(temp.value);

  // fuzzification
  let dry = triangle(s, 0, 0, 40);
  let wet = triangle(s, 60, 80, 100);

  let cold = triangle(t, 0, 0, 15);
  let hot = triangle(t, 25, 35, 40);

  let dark = triangle(l, 0, 0, 30);
  let bright = triangle(l, 60, 80, 100);

  let day = triangle(time, 6, 12, 18);
  let night = 1 - day;

  // ===== REGUŁY FUZZY =====
  let bad1 = Math.min(dry, hot);          // sucho + gorąco
  let bad2 = Math.min(wet, cold);         // mokro + zimno
  let bad3 = Math.min(dark, day);         // brak światła w dzień
  let bad4 = Math.min(bright, night);     // za jasno w nocy

  let bad = Math.max(bad1, bad2, bad3, bad4);

  // wpływ na zdrowie
  let change = -bad * 20 + 2; // lekka regeneracja

  health += change;

  if (health > 100) health = 100;
  if (health < 0) health = 0;

  // wiadomość
  if (bad > 0.6) {
    msg.innerText = "❗ Warunki złe!";
  } else if (bad > 0.3) {
    msg.innerText = "⚠️ Uważaj na roślinę";
  } else {
    msg.innerText = "✅ Roślina ma się dobrze";
  }

  // czas płynie
  time = (time + 1) % 24;

  updateUI();

  if (health <= 0) {
    alert("Roślina umarła 😢");
  }
}

// ===== AKCJE GRY =====
function water() {
